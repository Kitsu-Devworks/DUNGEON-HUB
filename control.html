<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dungeon Control | Kitsu DevWorks</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --led-green: #00ff88; --led-yellow: #facc15; --led-red: #ff3e3e; --led-cyan: #00f2ff; }
        body { font-family: 'Orbitron', sans-serif; background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .pro-title { background: linear-gradient(90deg, #00f2ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3)); }
        .fixed-logo { position: fixed; bottom: 10px; right: 5px; width: 110px; opacity: 0.6; pointer-events: none; filter: drop-shadow(0 0 5px var(--led-cyan)); }
        .main-card { width: 450px; height: 95vh; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(25px); border: 2px solid rgba(0, 242, 255, 0.2); border-radius: 2.5rem; display: flex; flex-direction: column; padding: 1.5rem; position: relative; }
        
        /* PULSACIÓN LENTA USUARIOS */
        @keyframes slowPulse { 0%, 100% { opacity: 1; filter: drop-shadow(0 0 2px var(--led-green)); } 50% { opacity: 0.4; } }
        .user-dot { width: 8px; height: 8px; background: var(--led-green); border-radius: 50%; display: inline-block; margin-right: 8px; animation: slowPulse 3s infinite; }

        .game-opt { flex: 1; padding: 8px; font-size: 9px; cursor: pointer; transition: 0.3s; text-align: center; border-radius: 8px; font-weight: 900; color: rgba(255,255,255,0.3); }
        .game-opt.active { background: var(--led-cyan); color: #000; box-shadow: 0 0 10px var(--led-cyan); }
        
        .btn-raid { width: 85px; height: 85px; border-radius: 50%; opacity: 0.15; pointer-events: none; transition: 0.3s; border: 3px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .enabled { opacity: 1 !important; pointer-events: auto !important; }
        .btn-raid:active { transform: scale(0.9); }
        .btn-easy { border-color: var(--led-green); color: var(--led-green); }
        .btn-medium { border-color: var(--led-yellow); color: var(--led-yellow); }
        .btn-hard { border-color: var(--led-red); color: var(--led-red); }

        .log-container { background: rgba(0,0,0,0.5); border-radius: 1.2rem; font-family: 'JetBrains Mono'; font-size: 0.7rem; padding: 1rem; flex-grow: 1; overflow-y: auto; color: var(--led-cyan); border: 1px solid rgba(255,255,255,0.05); }
        .cooldown { pointer-events: none !important; opacity: 0.3 !important; }
        .vol-sidebar { position: absolute; left: -80px; top: 50%; transform: rotate(-90deg) translateX(50%); width: 200px; }
    </style>
</head>
<body>
    <img src="KitsuLogo2.png" class="fixed-logo">
    <div class="main-card">
        <div class="text-center mb-4">
            <p id="roomIDDisplay" class="text-[9px] text-cyan-500/50 font-mono">SALA: ---</p>
            <h1 class="text-2xl font-black italic pro-title">DUNGEON CONTROL</h1>
            <input type="text" id="userName" placeholder="NICKNAME" maxlength="8" class="bg-black/60 border border-cyan-500/30 text-white text-[10px] p-2 rounded mt-2 outline-none w-2/3 text-center uppercase">
        </div>

        <div class="flex gap-2 mb-4 bg-black/40 p-1 rounded-xl border border-white/5">
            <div id="modeSL" class="game-opt active" onclick="setMode('Solo Leveling')">SOLO LEVELING</div>
            <div id="modeOP" class="game-opt" onclick="setMode('One Piece')">ONE PIECE</div>
        </div>

        <div class="flex justify-between mb-4">
            <button id="easyBtn" class="btn-raid btn-easy" onclick="sendSignal('EASY')">🛡️<span class="text-[8px] font-black mt-1">EASY</span></button>
            <button id="medBtn" class="btn-raid btn-medium" onclick="sendSignal('MEDIUM')">⚔️<span class="text-[8px] font-black mt-1">MEDIUM</span></button>
            <button id="hardBtn" class="btn-raid btn-hard" onclick="sendSignal('HARD')">💀<span class="text-[8px] font-black mt-1">HARD</span></button>
        </div>

        <button id="wayBtn" class="w-full py-4 rounded-xl border-2 border-cyan-400 text-cyan-400 font-black text-[10px] uppercase tracking-widest opacity-15 pointer-events-none" onclick="sendSignal('WAY')">🏃‍♂️ Confirmar en camino</button>
        
        <div class="h-12 flex items-center justify-center font-mono text-cyan-400 text-xl" id="timer-display"></div>

        <div id="log" class="log-container"></div>

        <div class="absolute -right-32 top-10 w-28 bg-black/60 p-3 rounded-r-xl border-l-2 border-cyan-400">
            <p class="text-[8px] text-cyan-400/50 mb-2">ONLINE (<span id="userCount">0</span>)</p>
            <div id="userList" class="space-y-1"></div>
        </div>
    </div>

    <script>
        const ROOM_ID = sessionStorage.getItem('dungeon_room');
        const ROOM_PIN = sessionStorage.getItem('dungeon_pin');
        const WORKER = 'https://dungeon-hub-core.kitsu-devworks.workers.dev/';
        let currentMode = 'Solo Leveling', onlineUsers = {}, isCooldown = false;

        document.getElementById('roomIDDisplay').innerText = `SALA: ${ROOM_ID}`;
        const pusher = new Pusher('78831e6e7f703ddd4fb2', { cluster: 'us2' });
        const channel = pusher.subscribe(`dungeon-room-${ROOM_ID}-${ROOM_PIN}`);

        const sounds = { EASY: new Audio("https://assets.mixkit.co/active_storage/sfx/2567/2567-preview.mp3"), MEDIUM: new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"), HARD: new Audio("https://assets.mixkit.co/active_storage/sfx/2573/2573-preview.mp3"), WAY: new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3") };

        channel.bind('client-sos', (data) => {
            let payload = typeof data === 'string' ? JSON.parse(data) : data;
            if (!payload.user) return;
            const [name, type, mode] = payload.user.split('|');
            onlineUsers[name.toUpperCase()] = Date.now();
            renderOnline();
            if (type === 'PULSE') return;

            sounds[type].play().catch(()=>{});
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            addLog(time, name.toUpperCase(), mode, type);
            if (type !== 'WAY') startTimer();
        });

        async function sendSignal(type) {
            if (isCooldown) return;
            const user = document.getElementById('userName').value.trim();
            if (user.length < 2) return;
            
            // Anti-spam de 3 segundos
            isCooldown = true; document.querySelectorAll('button').forEach(b => b.classList.add('cooldown'));
            setTimeout(() => { isCooldown = false; document.querySelectorAll('button').forEach(b => b.classList.remove('cooldown')); }, 3000);

            await fetch(WORKER, { method: 'POST', body: JSON.stringify({ user: `${user}|${type}|${currentMode}`, roomId: ROOM_ID, pin: ROOM_PIN }) });
        }

        function addLog(time, user, mode, type) {
            const log = document.getElementById('log');
            const msg = type === 'WAY' ? 'ESTÁ EN CAMINO' : `PIDE ${type}`;
            log.innerHTML = `<div class="mb-1 border-b border-white/5 pb-1"><span class="text-[8px] opacity-40">[${time}]</span> <span class="font-bold text-white">${user}</span> <span class="text-[9px] opacity-60">(${mode})</span> <br> <span class="text-white/80">${msg}</span></div>` + log.innerHTML;
        }

        function setMode(m) { currentMode = m; document.getElementById('modeSL').classList.toggle('active', m === 'Solo Leveling'); document.getElementById('modeOP').classList.toggle('active', m === 'One Piece'); }
        
        function renderOnline() {
            let html = '', count = 0, now = Date.now();
            for (let u in onlineUsers) {
                if (now - onlineUsers[u] > 35000) { delete onlineUsers[u]; continue; }
                html += `<div class="text-[9px] flex items-center text-cyan-400"><span class="user-dot"></span>${u}</div>`; count++;
            }
            document.getElementById('userList').innerHTML = html; document.getElementById('userCount').innerText = count;
        }

        document.getElementById('userName').addEventListener('input', (e) => {
            const ok = e.target.value.length >= 2;
            document.querySelectorAll('.btn-raid, #wayBtn').forEach(b => b.classList.toggle('enabled', ok));
        });

        function startTimer() {
            let s = 30; const disp = document.getElementById('timer-display');
            const it = setInterval(() => { disp.innerText = `${s--}s`; if (s < 0) { clearInterval(it); disp.innerText = ''; } }, 1000);
        }

        // Pulso de actividad y señal al Lobby
        setInterval(() => { if(document.getElementById('userName').value.length >= 2) sendSignal('PULSE'); }, 10000);
        setInterval(() => { fetch(WORKER, { method: 'POST', body: JSON.stringify({ roomName: ROOM_ID }) }); }, 20000);
    </script>
</body>
</html>
