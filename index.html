<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUNGEON HUB | Lobby Táctico</title>
    
    <link rel="icon" type="image/png" href="KitsuLogoMini.png">
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --p-glow: #bc13fe; --led-cyan: #00f2ff; }
        
        body { 
            font-family: 'Orbitron', sans-serif; 
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
            color: white; height: 100vh; margin: 0; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .pro-title { 
            background: linear-gradient(90deg, #00f2ff, #bc13fe); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 10px rgba(188, 19, 254, 0.3)); 
        }

        /* TU LOGO EN LA ESQUINA INFERIOR DERECHA */
        .fixed-logo { 
            position: fixed; bottom: 20px; right: 20px; 
            width: 150px; height: auto; opacity: 0.8; z-index: 100; 
            filter: drop-shadow(0 0 15px var(--led-cyan)); 
            pointer-events: none; 
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(188, 19, 254, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
        }

        .neon-input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(188, 19, 254, 0.4);
            color: #f0abff;
            font-family: 'JetBrains Mono';
            transition: 0.3s;
        }

        .neon-input:focus {
            border-color: var(--p-glow);
            box-shadow: 0 0 15px var(--p-glow);
            outline: none;
        }

        .room-card {
            background: rgba(188, 19, 254, 0.05);
            border: 1px solid rgba(188, 19, 254, 0.1);
            transition: 0.3s;
        }

        .room-card:hover {
            background: rgba(188, 19, 254, 0.15);
            border-color: var(--p-glow);
            transform: translateX(5px);
            cursor: pointer;
        }

        .reward-badge { 
            background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(188,19,254,0.3); 
            padding: 5px 12px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-family: 'JetBrains Mono'; 
            font-weight: bold;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--p-glow); border-radius: 10px; }
    </style>
</head>
<body>

    <img src="KitsuLogo2.png" alt="Kitsu" class="fixed-logo">

    <div class="flex flex-col md:flex-row gap-8 w-full max-w-6xl px-6 relative z-10">
        
        <div class="w-full md:w-1/2 glass-panel p-10 rounded-[2.5rem]">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black italic pro-title mb-2">DUNGEON HUB</h1>
                <p class="text-[10px] text-purple-400 font-mono tracking-[0.3em] uppercase">>> Panel de Frecuencias</p>
                
                <div class="flex justify-center gap-3 mt-6">
                    <div class="reward-badge text-blue-400">R$ 796</div>
                    <div class="reward-badge text-purple-400">💎 1097</div>
                </div>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-[10px] uppercase font-bold text-purple-300/60 ml-1 mb-2 block">ID de la Sala (Freq)</label>
                    <input type="text" id="roomName" placeholder="NOMBRE DEL EQUIPO" maxlength="14" class="w-full p-4 rounded-2xl neon-input uppercase text-sm tracking-widest">
                </div>

                <div>
                    <label class="text-[10px] uppercase font-bold text-purple-300/60 ml-1 mb-2 block">PIN de Encriptación</label>
                    <input type="password" id="roomPin" placeholder="****" maxlength="4" class="w-full p-4 rounded-2xl neon-input text-center text-xl tracking-[1em]">
                </div>

                <button onclick="joinRoom()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-5 rounded-2xl shadow-[0_10px_20px_rgba(188,19,254,0.3)] transition-all uppercase tracking-widest text-sm active:scale-95">
                    Establecer Conexión
                </button>
            </div>
        </div>

        <div class="w-full md:w-1/2 glass-panel p-10 rounded-[2.5rem] flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xs font-black uppercase tracking-widest text-purple-400">Escaneando Señales...</h2>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
                    <span id="globalCount" class="text-[10px] font-mono text-green-400">0 ACTIVAS</span>
                </div>
            </div>

            <div id="roomList" class="flex-grow overflow-y-auto space-y-4 pr-3 custom-scroll">
                <div class="text-center py-20 opacity-30 text-[10px] font-mono italic">
                    Buscando transmisiones encriptadas...
                </div>
            </div>
        </div>

    </div>

    <script>
        const PUSHER_KEY = '78831e6e7f703ddd4fb2';
        const pusher = new Pusher(PUSHER_KEY, { cluster: 'us2' });
        
        // Suscripción al canal global para ver salas activas
        const lobbyChannel = pusher.subscribe('dungeon-lobby-global');
        let activeRooms = {};

        lobbyChannel.bind('client-sos', (data) => {
            if(data.roomName) {
                activeRooms[data.roomName] = { lastSeen: Date.now() };
                renderRooms();
            }
        });

        function renderRooms() {
            const list = document.getElementById('roomList');
            const now = Date.now();
            let html = '', count = 0;

            for (let name in activeRooms) {
                if (now - activeRooms[name].lastSeen > 40000) {
                    delete activeRooms[name];
                    continue;
                }
                count++;
                html += `
                    <div class="room-card p-5 rounded-2xl flex justify-between items-center group" onclick="selectRoom('${name}')">
                        <div>
                            <div class="text-[9px] text-purple-500 font-mono mb-1">FREQ_ID:</div>
                            <div class="text-lg font-bold tracking-tighter group-hover:text-cyan-400 transition-colors">${name.toUpperCase()}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[9px] text-green-500 font-bold mb-1">ONLINE</div>
                            <div class="text-[8px] text-white/30 font-mono italic">ENCRIPTADA</div>
                        </div>
                    </div>
                `;
            }

            list.innerHTML = html || '<div class="text-center py-20 opacity-30 text-[10px] font-mono italic">No se detectan escuadrones activos...</div>';
            document.getElementById('globalCount').innerText = `${count} ACTIVAS`;
        }

        function selectRoom(name) {
            document.getElementById('roomName').value = name;
            document.getElementById('roomPin').focus();
        }

        function joinRoom() {
            const name = document.getElementById('roomName').value.trim().toUpperCase();
            const pin = document.getElementById('roomPin').value;

            if (name.length < 3 || pin.length < 4) {
                alert("PROTOCOL ERROR: Nombre y PIN requeridos.");
                return;
            }

            sessionStorage.setItem('dungeon_room', name);
            sessionStorage.setItem('dungeon_pin', pin);
            window.location.href = 'control.html'; 
        }

        setInterval(renderRooms, 10000);
    </script>
</body>
</html>
