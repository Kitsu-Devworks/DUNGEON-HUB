<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUNGEON HUB | Lobby Táctico</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-glow: #bc13fe; --p-dark: #0f021a; }
        body { 
            font-family: 'Orbitron', sans-serif; 
            background: radial-gradient(circle at center, #1a0a2e 0%, #05010a 100%);
            color: white; height: 100vh; margin: 0; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .glass-panel {
            background: rgba(15, 2, 26, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(188, 19, 254, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        .neon-input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(188, 19, 254, 0.4);
            color: #f0abff;
            font-family: 'JetBrains Mono';
        }
        .neon-input:focus { border-color: var(--p-glow); box-shadow: 0 0 15px var(--p-glow); outline: none; }
        .room-card {
            background: rgba(188, 19, 254, 0.05);
            border: 1px solid rgba(188, 19, 254, 0.1);
            transition: 0.3s;
        }
        .room-card:hover { background: rgba(188, 19, 254, 0.15); border-color: var(--p-glow); transform: translateX(5px); cursor: pointer; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--p-glow); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="flex flex-col md:flex-row gap-8 w-full max-w-6xl px-6">
        <div class="w-full md:w-1/2 glass-panel p-10 rounded-[2.5rem]">
            <h1 class="text-4xl font-black italic mb-2 tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-white via-purple-300 to-purple-600">DUNGEON HUB</h1>
            <p class="text-[10px] text-purple-400 font-mono mb-10 tracking-[0.2em] uppercase">>> Frecuencia de Salto</p>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] uppercase font-bold text-purple-300/60 mb-2 block ml-1 text-left">ID de la Sala</label>
                    <input type="text" id="roomName" placeholder="NOMBRE DEL EQUIPO" maxlength="14" class="w-full p-4 rounded-2xl neon-input uppercase text-sm tracking-widest">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-purple-300/60 mb-2 block ml-1 text-left">PIN de Acceso</label>
                    <input type="password" id="roomPin" placeholder="****" maxlength="4" class="w-full p-4 rounded-2xl neon-input text-center text-xl tracking-[0.8em]">
                </div>
                <button onclick="joinRoom()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-5 rounded-2xl shadow-[0_10px_20px_rgba(188,19,254,0.3)] transition-all uppercase tracking-widest text-sm">Establecer Conexión</button>
            </div>
        </div>
        <div class="w-full md:w-1/2 glass-panel p-10 rounded-[2.5rem] flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xs font-black uppercase tracking-widest text-purple-400">Salas Detectadas</h2>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
                    <span id="globalCount" class="text-[10px] font-mono text-green-400">0 SCANNING...</span>
                </div>
            </div>
            <div id="roomList" class="flex-grow overflow-y-auto space-y-4 pr-3 custom-scroll">
                <div class="text-center py-20 opacity-30 text-[10px] font-mono italic">Buscando transmisiones...</div>
            </div>
        </div>
    </div>

    <script>
        const PUSHER_KEY = '78831e6e7f703ddd4fb2';
        const pusher = new Pusher(PUSHER_KEY, { cluster: 'us2' });
        const lobbyChannel = pusher.subscribe('dungeon-lobby-global');
        let activeRooms = {};

        lobbyChannel.bind('client-sos', (data) => {
            if(data.roomName) {
                activeRooms[data.roomName] = { lastSeen: Date.now() };
                renderRooms();
            }
        });

        function renderRooms() {
            const list = document.getElementById('roomList');
            const now = Date.now();
            let html = '', count = 0;
            for (let name in activeRooms) {
                if (now - activeRooms[name].lastSeen > 40000) { delete activeRooms[name]; continue; }
                count++;
                html += `
                    <div class="room-card p-5 rounded-2xl flex justify-between items-center" onclick="selectRoom('${name}')">
                        <div class="text-left">
                            <div class="text-[9px] text-purple-500 font-mono mb-1">FREQ_ID:</div>
                            <div class="text-lg font-bold tracking-tighter">${name.toUpperCase()}</div>
                        </div>
                        <div class="text-[9px] text-green-500 font-bold animate-pulse">ONLINE</div>
                    </div>`;
            }
            list.innerHTML = html || '<div class="text-center py-20 opacity-30 text-[10px] font-mono italic">Esperando señal...</div>';
            document.getElementById('globalCount').innerText = `${count} SALAS ACTIVAS`;
        }

        function selectRoom(name) { document.getElementById('roomName').value = name; document.getElementById('roomPin').focus(); }
        function joinRoom() {
            const name = document.getElementById('roomName').value.trim().toUpperCase();
            const pin = document.getElementById('roomPin').value;
            if (name.length < 3 || pin.length < 4) return alert("Datos incompletos");
            sessionStorage.setItem('dungeon_room', name);
            sessionStorage.setItem('dungeon_pin', pin);
            window.location.href = 'control.html';
        }
        setInterval(renderRooms, 10000);
    </script>
</body>
</html>
