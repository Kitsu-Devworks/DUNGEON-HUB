<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Kitsu DevWorks</title>
    
    <link rel="icon" type="image/png" href="KitsuLogoMini.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --led-cyan: #00f2ff; }
        
        body { 
            font-family: 'Orbitron', sans-serif; 
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%); 
            height: 100vh; margin: 0; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; 
        }

        /* TU DISEÑO ORIGINAL */
        .glass-card { 
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(20px); 
            border: 2px solid rgba(0, 242, 255, 0.2); 
            width: 400px; 
            padding: 2.5rem; 
            border-radius: 2.5rem; 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
        }

        .pro-input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: white;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            font-family: 'JetBrains Mono';
            outline: none;
            transition: 0.3s;
            text-align: center;
        }

        .pro-input:focus { border-color: var(--led-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        .btn-login {
            background: var(--led-cyan);
            color: black;
            font-weight: 900;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            transition: 0.3s;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        .btn-login:hover { transform: scale(1.02); filter: brightness(1.2); }
        
        .logo-main { width: 180px; margin: 0 auto 2rem; display: block; filter: drop-shadow(0 0 10px var(--led-cyan)); }
    </style>
</head>
<body>

    <div class="glass-card">
        <img src="KitsuLogo2.png" alt="Kitsu DevWorks" class="logo-main">
        
        <div class="space-y-4">
            <div>
                <label class="text-[9px] text-cyan-400 ml-2 mb-1 block font-bold uppercase">Nombre de Sala</label>
                <input type="text" id="roomName" placeholder="ROOM ID" class="pro-input uppercase">
            </div>
            
            <div>
                <label class="text-[9px] text-cyan-400 ml-2 mb-1 block font-bold uppercase">Pin de Acceso</label>
                <input type="password" id="roomPin" placeholder="****" maxlength="4" class="pro-input">
            </div>

            <button onclick="enterRoom()" class="btn-login mt-4">INGRESAR</button>
        </div>

        <p class="text-[8px] text-center text-white/20 mt-8 font-mono">KITSU DEVWORKS &copy; 2026</p>
    </div>

    <script>
        function enterRoom() {
            const name = document.getElementById('roomName').value.trim().toUpperCase();
            const pin = document.getElementById('roomPin').value.trim();

            if (name.length < 3 || pin.length < 4) {
                alert("DATOS INVÁLIDOS");
                return;
            }

            // Guardamos para que el control.html sepa a dónde conectarse
            sessionStorage.setItem('dungeon_room', name);
            sessionStorage.setItem('dungeon_pin', pin);
            window.location.href = 'control.html';
        }

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') enterRoom(); });
    </script>
</body>
</html>
